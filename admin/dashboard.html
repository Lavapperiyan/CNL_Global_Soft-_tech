<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CNL Global Soft Tech Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a1929;
            --sidebar-bg: rgba(255, 255, 255, 0.03);
            --primary-cyan: #009ca6;
            --accent-red: #fc8181;
            --text-main: #f8f9fa;
            --text-dim: #a0aec0;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: #060e17;
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
        }

        .sidebar-logo {
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo img {
            height: 35px;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1.2rem;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(0, 156, 166, 0.1);
            color: var(--primary-cyan);
        }

        .logout-btn {
            margin-top: auto;
            color: var(--accent-red);
            padding: 1rem;
            border: 1px solid rgba(252, 129, 129, 0.2);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(252, 129, 129, 0.1);
        }

        /* Main Content Styles */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 3rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--sidebar-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin: 0 0 10px 0;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-cyan);
        }

        /* Services Table/Grid */
        .content-card {
            background: var(--sidebar-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-add {
            background: var(--primary-cyan);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            box-shadow: 0 10px 20px rgba(0, 156, 166, 0.2);
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1.2rem 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 1.2rem 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .service-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-cyan);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background: rgba(72, 187, 120, 0.1); color: #48bb78; }
        .badge-warn { background: rgba(237, 137, 54, 0.1); color: #ed8936; }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            color: var(--text-main);
            border-color: var(--text-dim);
        }

        .btn-delete:hover {
            color: var(--accent-red);
            border-color: var(--accent-red);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0d1e2e;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: 1 / -1; }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        .form-group textarea { height: 100px; resize: vertical; }

        .form-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #060e17;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary-cyan)"></i>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="../assets/CNL_Global_Soft_Tech_logo.png" alt="Logo">
            <span style="font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px;">CNL ADMIN</span>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#" class="nav-link active">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="../index.html" class="nav-link" target="_blank">
                    <i class="fas fa-external-link-alt"></i> View Website
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-chart-pie"></i> Analytics
                </a>
            </li>
        </ul>
        <div class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> Logout Session
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <div>
                <h1>Services Management</h1>
                <p style="color: var(--text-dim); margin-top: 5px;">Control your dynamic service catalog real-time.</p>
            </div>
            <button class="btn-add" id="openModalBtn">
                <i class="fas fa-plus"></i> New Service
            </button>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Services</h3>
                <div class="value" id="countTotal">0</div>
            </div>
            <div class="stat-card">
                <h3>Featured</h3>
                <div class="value" id="countFeatured">0</div>
            </div>
            <div class="stat-card">
                <h3>Updates Today</h3>
                <div class="value">2</div>
            </div>
        </div>

        <!-- Table Card -->
        <div class="content-card">
            <div class="card-header">
                <div style="font-weight: 600; font-size: 1.1rem;">Active Services</div>
                <div class="search-box" style="position: relative;">
                    <i class="fas fa-search" style="position: absolute; left: 12px; top: 12px; color: var(--text-dim); font-size: 0.9rem;"></i>
                    <input type="text" placeholder="Search services..." id="searchInput" style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 10px; color: white; padding: 10px 15px 10px 35px; min-width: 250px; outline: none;">
                </div>
            </div>
            <table id="servicesTable">
                <thead>
                    <tr>
                        <th>Service Name</th>
                        <th>Icon Class</th>
                        <th>Price Range</th>
                        <th>Featured</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="servicesBody">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- New/Edit Modal -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Service</h2>
                <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="serviceForm">
                    <input type="hidden" id="serviceId">
                    
                    <div class="form-group">
                        <label>SERVICE TITLE</label>
                        <input type="text" id="title" placeholder="e.g., Web Development" required>
                    </div>
                    <div class="form-group">
                        <label>HEADING</label>
                        <input type="text" id="heading" placeholder="Marketing Heading">
                    </div>
                    
                    <div class="form-group full-width">
                        <label>SHORT DESCRIPTION (2-3 lines)</label>
                        <textarea id="short_desc" required></textarea>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>DETAILED DESCRIPTION (Professional overview)</label>
                        <textarea id="detailed_desc" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>FONTAWESOME ICON CLASS</label>
                        <input type="text" id="icon" placeholder="fa-code" required>
                    </div>
                    <div class="form-group">
                        <label>FEATURED SERVICE?</label>
                        <select id="is_featured">
                            <option value="false">No</option>
                            <option value="true">Yes (Show on Home)</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>INCLUSIONS (Comma separated list)</label>
                        <input type="text" id="inclusions" placeholder="Item 1, Item 2, Item 3">
                    </div>

                    <div class="form-group full-width">
                        <label>PRICING JSON (Advanced: [{"label": "Plan Name", "value": "Price"}])</label>
                        <textarea id="pricing" placeholder='[{"label": "Standard", "value": "Rs. 10,000"}]'></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>SPECIAL OFFER TEXT (Optional)</label>
                        <input type="text" id="special_offer" placeholder="🔥 20% OFF this month">
                    </div>

                    <div class="form-actions full-width">
                        <button type="button" class="btn-cancel" onclick="closeModal()">CANCEL</button>
                        <button type="submit" class="btn-add" id="saveBtn">SAVE SERVICE</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Dashboard Logic Container -->
    <script type="module" src="admin.js"></script>
</body>
</html>
